services:
  dsph:
    build:
      context: .
      dockerfile: Dockerfile
    image: dsph-agent:latest
    container_name: dsph-gpu
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./simulations:/data
      - ./cases:/cases
    stdin_open: true
    tty: true
    working_dir: /data
    command: sleep infinity
